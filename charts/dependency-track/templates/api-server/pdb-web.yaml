{{- if .Values.apiServer.web.pdb.enabled }}
{{- $min := .Values.apiServer.web.pdb.minAvailable }}
{{- $max := .Values.apiServer.web.pdb.maxUnavailable }}
{{- if and (not (kindIs "invalid" $min)) (not (kindIs "invalid" $max)) }}
{{- fail "apiServer.web.pdb: minAvailable and maxUnavailable are mutually exclusive; set exactly one" }}
{{- end }}
{{- if and (kindIs "invalid" $min) (kindIs "invalid" $max) }}
{{- fail "apiServer.web.pdb.enabled requires either minAvailable or maxUnavailable" }}
{{- end -}}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "dependencytrack.apiServer.webFullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "dependencytrack.componentLabels" (dict "ctx" . "component" "api-server" "role" "web") | nindent 4 }}
spec:
  {{- if not (kindIs "invalid" $min) }}
  minAvailable: {{ $min }}
  {{- end }}
  {{- if not (kindIs "invalid" $max) }}
  maxUnavailable: {{ $max }}
  {{- end }}
  selector:
    matchLabels: {{- include "dependencytrack.selectorLabels" (dict "ctx" . "component" "api-server" "role" "web") | nindent 6 }}
{{- end }}
