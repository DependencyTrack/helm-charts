{{- if .Values.httpRoute.enabled }}
{{- if not .Values.httpRoute.parentRefs }}
{{- fail "httpRoute.enabled=true requires httpRoute.parentRefs; a HTTPRoute with no parentRefs is silently rejected by Gateway controllers" }}
{{- end }}
{{- $apiSvc := include "dependencytrack.apiServer.webFullname" . }}
{{- $rootSvc := ternary (include "dependencytrack.frontend.fullname" .) $apiSvc .Values.frontend.enabled }}
{{- $rootPort := ternary (int .Values.frontend.service.port) (int .Values.apiServer.service.port) .Values.frontend.enabled -}}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "dependencytrack.fullname" . }}
  namespace: {{ .Release.Namespace }}
  {{- with .Values.httpRoute.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    {{- include "dependencytrack.commonLabels" . | nindent 4 }}
    {{- with .Values.httpRoute.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  parentRefs: {{- toYaml .Values.httpRoute.parentRefs | nindent 4 }}
  hostnames:
    {{- range .Values.httpRoute.hostnames }}
    - {{ . | quote }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - kind: Service
          name: {{ $apiSvc }}
          port: {{ .Values.apiServer.service.port }}
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - kind: Service
          name: {{ $rootSvc }}
          port: {{ $rootPort }}
          weight: 1
{{- end }}
