{{- if .Values.database.existingSecret.name }}
{{- if or .Values.database.username .Values.database.password }}
{{- fail "database.existingSecret.name is set; remove database.username and database.password to avoid ambiguity about which credentials are in effect" }}
{{- end }}
{{- else }}
{{- if or (not .Values.database.username) (not .Values.database.password) }}
{{- fail "database.username and database.password must be set, or database.existingSecret.name must reference an existing Secret" }}
{{- end -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dependencytrack.db.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "dependencytrack.commonLabels" . | nindent 4 }}
type: Opaque
data:
  username: {{ .Values.database.username | b64enc | quote }}
  password: {{ .Values.database.password | b64enc | quote }}
{{- end }}
