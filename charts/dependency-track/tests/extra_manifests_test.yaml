suite: extra-manifests
release:
  name: dt
  namespace: dt-test
templates:
  - extra-manifests.yaml
tests:
  - it: no extraObjects renders no documents
    asserts:
      - hasDocuments:
          count: 0

  - it: extraObjects entries render verbatim and resolve {{ .Release.Namespace }}
    set:
      extraObjects:
        - apiVersion: v1
          kind: ConfigMap
          metadata:
            name: dt-extra
            namespace: "{{ .Release.Namespace }}"
          data:
            release: "{{ .Release.Name }}"
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: dt-extra
      - equal:
          path: metadata.namespace
          value: dt-test
      - equal:
          path: data.release
          value: dt
