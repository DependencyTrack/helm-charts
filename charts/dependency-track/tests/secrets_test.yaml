suite: secrets
release:
  name: dt
  namespace: dt-test
tests:
  - it: an existing database Secret suppresses the chart-managed db Secret and renames its keys
    set:
      database.existingSecret.name: dt-db
      database.existingSecret.usernameKey: user
      database.existingSecret.passwordKey: pass
      secretManagement.database.kek.existingSecret.name: dt-kek
    asserts:
      - hasDocuments:
          count: 0
        template: secrets/db.yaml
      - contains:
          path: spec.template.spec.volumes
          content:
            name: db-secret
          any: true
        template: api-server/deployment-web.yaml
      - equal:
          path: spec.template.spec.volumes[1].secret.secretName
          value: dt-db
        template: api-server/deployment-web.yaml
      - equal:
          path: spec.template.spec.volumes[1].secret.items[0].key
          value: user
        template: api-server/deployment-web.yaml
      - equal:
          path: spec.template.spec.volumes[1].secret.items[0].path
          value: username
        template: api-server/deployment-web.yaml

  - it: secretManagement provider=database without a KEK fails fast
    set:
      database.username: dtrack
      database.password: dtrack
    template: api-server/deployment-web.yaml
    asserts:
      - failedTemplate:
          errorMessage: "secretManagement.database.kek is required when secretManagement.provider=database. Either set secretManagement.database.kek.value (chart creates the Secret; generate one with `openssl rand -base64 32`), or provision the KEK Secret separately and reference it via secretManagement.database.kek.existingSecret.name."

  - it: an inline KEK value renders a chart-managed KEK Secret
    set:
      database.username: dtrack
      database.password: dtrack
      secretManagement.database.kek.value: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
    template: secrets/kek.yaml
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: dt-dependency-track-kek
      - equal:
          path: data.kek
          # b64enc of the inline value
          value: QUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQT0=

  - it: an inline KEK value is referenced by the web Deployment volume
    set:
      database.username: dtrack
      database.password: dtrack
      secretManagement.database.kek.value: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
    template: api-server/deployment-web.yaml
    asserts:
      - equal:
          path: spec.template.spec.volumes[2].secret.secretName
          value: dt-dependency-track-kek

  - it: an existing KEK Secret suppresses the chart-managed KEK Secret
    set:
      database.username: dtrack
      database.password: dtrack
      secretManagement.database.kek.existingSecret.name: dt-kek
    template: secrets/kek.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: setting both inline KEK value and existingSecret fails fast
    set:
      database.username: dtrack
      database.password: dtrack
      secretManagement.database.kek.value: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
      secretManagement.database.kek.existingSecret.name: dt-kek
    template: api-server/deployment-web.yaml
    asserts:
      - failedTemplate:
          errorMessage: "secretManagement.database.kek.value and secretManagement.database.kek.existingSecret.name are both set; remove one to avoid ambiguity about which KEK is in effect"

  - it: an inline KEK value with the initializer enabled fails fast
    set:
      database.existingSecret.name: dt-db
      secretManagement.database.kek.value: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
      apiServer.initializer.enabled: true
    template: api-server/initializer-job.yaml
    asserts:
      - failedTemplate:
          errorMessage: "apiServer.initializer.enabled is incompatible with an inline secretManagement.database.kek.value: the pre-install/pre-upgrade hook Job runs before chart-managed Secrets are created. Provision the KEK Secret separately and reference it via secretManagement.database.kek.existingSecret.name."

  - it: chart-managed database Secret refuses ambiguous existingSecret + plaintext combo
    set:
      database.existingSecret.name: dt-db
      database.username: dtrack
      database.password: dtrack
      secretManagement.database.kek.existingSecret.name: dt-kek
    template: secrets/db.yaml
    asserts:
      - failedTemplate:
          errorMessage: "database.existingSecret.name is set; remove database.username and database.password to avoid ambiguity about which credentials are in effect"

  - it: chart-managed database Secret refuses neither-existingSecret-nor-plaintext
    set:
      secretManagement.database.kek.existingSecret.name: dt-kek
    template: secrets/db.yaml
    asserts:
      - failedTemplate:
          errorMessage: "database.username and database.password must be set, or database.existingSecret.name must reference an existing Secret"

  - it: chart-rendered ServiceAccount has resource-policy keep and forwards user annotations
    set:
      database.username: dtrack
      database.password: dtrack
      secretManagement.database.kek.existingSecret.name: dt-kek
      serviceAccount.annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/dt
    template: serviceaccount.yaml
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/resource-policy"]
          value: keep
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::123456789012:role/dt
      - equal:
          path: automountServiceAccountToken
          value: false
