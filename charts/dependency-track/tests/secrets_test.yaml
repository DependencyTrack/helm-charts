suite: secrets
release:
  name: dt
  namespace: dt-test
tests:
  - it: an existing database Secret suppresses the chart-managed db Secret and renames its keys
    set:
      database.existingSecret.name: dt-db
      database.existingSecret.usernameKey: user
      database.existingSecret.passwordKey: pass
      secretManagement.database.kek.existingSecret.name: dt-kek
    asserts:
      - hasDocuments:
          count: 0
        template: secrets/db.yaml
      - contains:
          path: spec.template.spec.volumes
          content:
            name: db-secret
          any: true
        template: api-server/deployment-web.yaml
      - equal:
          path: spec.template.spec.volumes[1].secret.secretName
          value: dt-db
        template: api-server/deployment-web.yaml
      - equal:
          path: spec.template.spec.volumes[1].secret.items[0].key
          value: user
        template: api-server/deployment-web.yaml
      - equal:
          path: spec.template.spec.volumes[1].secret.items[0].path
          value: username
        template: api-server/deployment-web.yaml

  - it: secretManagement provider=database without an existingSecret fails fast
    set:
      database.username: dtrack
      database.password: dtrack
    template: api-server/deployment-web.yaml
    asserts:
      - failedTemplate:
          errorMessage: "secretManagement.database.kek.existingSecret.name is required when secretManagement.provider=database. Provision the KEK Secret out of band (ESO/Vault/SealedSecrets) and reference it here."

  - it: chart-managed database Secret refuses ambiguous existingSecret + plaintext combo
    set:
      database.existingSecret.name: dt-db
      database.username: dtrack
      database.password: dtrack
      secretManagement.database.kek.existingSecret.name: dt-kek
    template: secrets/db.yaml
    asserts:
      - failedTemplate:
          errorMessage: "database.existingSecret.name is set; remove database.username and database.password to avoid ambiguity about which credentials are in effect"

  - it: chart-managed database Secret refuses neither-existingSecret-nor-plaintext
    set:
      secretManagement.database.kek.existingSecret.name: dt-kek
    template: secrets/db.yaml
    asserts:
      - failedTemplate:
          errorMessage: "database.username and database.password must be set, or database.existingSecret.name must reference an existing Secret"

  - it: chart-rendered ServiceAccount has resource-policy keep and forwards user annotations
    set:
      database.username: dtrack
      database.password: dtrack
      secretManagement.database.kek.existingSecret.name: dt-kek
      serviceAccount.annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/dt
    template: serviceaccount.yaml
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/resource-policy"]
          value: keep
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::123456789012:role/dt
      - equal:
          path: automountServiceAccountToken
          value: false
